<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section
      data-testid="test-todo-card"
      role="region"
      aria-label="Todo task card"
    >
      <div class="top-row">
        <div class="checkbox-wrap">
          <label>
            <input
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
              onchange="toggleComplete(this)"
            />
          </label>
        </div>
        <div class="title-area">
          <h2 data-testid="test-todo-title">
            Redesign the Kookietng order page
          </h2>
          <p data-testid="test-todo-description">
            Update the product cards layout, add a quantity selector, and
            improve mobile responsiveness before the April promo launch.
          </p>
        </div>
      </div>

      <div class="badges-row" role="group" aria-label="Task metadata">
        <span
          class="badge high"
          data-testid="test-todo-priority"
          aria-label="Priority: High"
          >High</span
        >

        <span
          class="badge pending"
          data-testid="test-todo-status"
          id="status-badge"
          aria-label="Status: Pending"
          >Pending</span
        >
      </div>

      <div class="date-section">
        <div class="date-label">
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          Deadline
        </div>
        <time data-testid="test-todo-due-date" datetime="2026-04-16T23:59:00">
          Due Apr 16, 2026
        </time>
        <span
          data-testid="test-todo-time-remaining"
          id="time-remaining"
          aria-live="polite"
          aria-label="Time remaining"
          >Calculating...</span
        >
      </div>

      <ul data-testid="test-todo-tags" role="list" aria-label="Tags">
        <li data-testid="test-todo-tag-work" role="listitem"># work</li>
        <li data-testid="test-todo-tag-urgent" role="listitem"># urgent</li>
        <li role="listitem"># design</li>
      </ul>

      <div class="actions-row">
        <button
          class="btn"
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          onclick="console.log('edit clicked')"
        >
          <svg
            width="13"
            height="13"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
            aria-hidden="true"
          >
            <path
              d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
            />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          Edit
        </button>
        <button
          class="btn"
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          onclick="alert('Delete clicked')"
        >
          <svg
            width="13"
            height="13"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
            aria-hidden="true"
          >
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          </svg>
          Delete
        </button>
      </div>
    </section>
    <script src="./script.js"></script>
  </body>
</html>
